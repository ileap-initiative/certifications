name: Validate JSON Files

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'certifications/*.json'
      - 'revocations/*.json'
      - 'tools/*.json'
      - 'schema/*.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install AJV and AJV Formats
        run: npm install -g ajv-cli ajv-formats

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            certifications/*.json
            revocations/*.json
            tools/*.json

      - name: Validate changed files
        if: steps.changed-files.outputs.all_changed_files != ''
        run: |
          EXIT_CODE=0
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            if [[ $file == certifications/*.json ]]; then
              echo "Validating certification: $file"
              ajv validate -s schema/certification.json -d "$file" --spec=draft2020 -c ajv-formats || EXIT_CODE=$?
            elif [[ $file == revocations/*.json ]]; then
              echo "Validating revocation: $file"
              ajv validate -s schema/revocation.json -d "$file" --spec=draft2020 -c ajv-formats || EXIT_CODE=$?
            elif [[ $file == tools/*.json ]]; then
              echo "Validating tool: $file"
              ajv validate -s schema/tool.json -d "$file" --spec=draft2020 -c ajv-formats || EXIT_CODE=$?
            fi
          done
          exit $EXIT_CODE

      - name: Report validation results
        if: failure()
        run: |
          echo "❌ JSON Schema validation failed!"
          echo "Please ensure all JSON files match their corresponding schema:"
          echo "- certifications/*.json → schema/certification.json"
          echo "- revocations/*.json → schema/revocation.json"
          echo "- tools/*.json → schema/tool.json"
          exit 1
